name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: nix develop --command bash -c "pnpm install --frozen-lockfile"

      - name: Type check
        run: nix develop --command bash -c "pnpm typecheck"

      - name: Unit tests
        run: nix develop --command bash -c "pnpm test"

      - name: E2E tests
        run: nix develop --command bash -c "pnpm test:e2e"
